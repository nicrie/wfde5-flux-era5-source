name: wfde5-ea-an-oper-0001-mars-0p5-1979-2019-1h-v3

description: Global dataset (1979-2019) at 0.5 deg resolution, merging selected ERA5 and WFDE5 variables.

attribution: ECMWF/C3S

licence: CC-BY-4.0

dates:
  start: "2000-01-30T00:00:00" # missing data for hours 0-7
  end: "2000-02-02T23:00:00"
  frequency: 1h

input:
  join:
    - pipe:
        - join:
            # From MARS/ERA5
            - pipe:
                - mars:
                    class: ea
                    expver: "0001"
                    grid: n320
                    levtype: sfc
                    param:
                      - 10u
                      - 10v
                - uv-to-ddff:
                    u_component: 10u # str
                    v_component: 10v # str
                    wind_speed: ws # str
                    wind_direction: wdir # str
                    convention: meteo # str
                    radians: false # bool
            - accumulate:
                period: 1h
                availability: auto
                source:
                  mars:
                    expver: "0001"
                    class: ea
                    stream: oper
                    type: fc
                    grid: n320
                    levtype: sfc
                    param:
                      - 235036 # avg_sdlwrf; average surface downward longwave radiation flux

        - regrid:
            matrix: /home/ecm6845/Projects/wfde5/wfde5_nrt/data/anemoi-datasets/interpolation_matrix/interpolation_matrix.npz
    # WFDE5 dataset
    - netcdf:
        path: "/ec/res4/scratch/ecm6845/wfde5-ml/wfde5/v2.1/Wind/CRU/Wind_WFDE5_CRU_{date:strftime(%Y%m)}_v2.1.nc"
    - wfde5-flux-era5-time:
        global_start: "1979-01-01T00:00:00"
        source:
          netcdf:
            path: "/ec/res4/scratch/ecm6845/wfde5-ml/wfde5/v2.1/LWdown/CRU/LWdown_WFDE5_CRU_{date:strftime(%Y%m)}_v2.1.nc"



statistics:
  allow_nans:
    [
      Wind,
      ASurf,
      PSurf,
      Qair,
      Tair,
      Rainf,
      Snowf,
      Rainf_gpcc,
      Snowf_gpcc,
      LWdown,
      SWdown,
    ]

output:
  dtype: float32

build:
  additions: true
  group_by: 48
  use_grib_paramid: false
  variable_naming: default

resources:
  cpus_per_task: 32
  memory_per_node: 32G
  tasks_per_node: 1
  total_nodes: 1
